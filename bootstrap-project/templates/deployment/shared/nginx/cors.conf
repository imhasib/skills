# ===========================================
# CORS Configuration — Centralized at Nginx
# Include this from API location blocks that need CORS support.
# Handles both preflight (OPTIONS) and actual requests.
# Uses $cors_origin (defined per-env in nginx.conf) to whitelist origins.
# ===========================================

add_header Access-Control-Allow-Origin $cors_origin always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, Cache-Control, Pragma, If-Modified-Since, {{API_VERSION_HEADER}}, Idempotency-Key" always;
add_header Access-Control-Expose-Headers "{{API_VERSION_HEADER}}" always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age 86400 always;
# Vary is REQUIRED when using dynamic origin to prevent caching issues
add_header Vary "Origin" always;

# Handle preflight at nginx — don't forward to backend.
# add_header in `if` blocks with `return` doesn't apply the outer headers,
# so duplicate them here.
if ($request_method = 'OPTIONS') {
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, Cache-Control, Pragma, If-Modified-Since, {{API_VERSION_HEADER}}, Idempotency-Key" always;
    add_header Access-Control-Expose-Headers "{{API_VERSION_HEADER}}" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;
    add_header Vary "Origin" always;
    add_header Content-Length 0 always;
    add_header Content-Type "text/plain; charset=utf-8" always;
    return 204;
}
